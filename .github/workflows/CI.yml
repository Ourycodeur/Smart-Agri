name: CI - Tests & Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  test:
    name: Tests unitaires API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3
        with:
          lfs: true           # ← télécharge les fichiers Git LFS

      - name: Pull fichiers Git LFS
        run: git lfs pull     # ← force le pull LFS

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Installation des dépendances
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Lancement des tests unitaires
        run: pytest tests/ -v
        env:
          PYTHONPATH: ${{ github.workspace }}

  build:
    name: Build image Docker API
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3
        with:
          lfs: true

      - name: Build image Docker API
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: api/Dockerfile
          push: false
          tags: agrismart-api:latest